<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f1f3f6;
        }
        .success-card {
            background: #fff;
            border-radius: 14px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .success-icon {
            font-size: 70px;
        }
        .order-box {
            background: #fafafa;
            border-radius: 10px;
            padding: 15px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="success-card text-center">

                <!-- ✅ Success Icon -->
                <div class="success-icon text-success mb-3">
                    ✅
                </div>

                <h3 class="fw-bold mb-2">Order Placed Successfully!</h3>

                <p class="text-muted mb-4">
                    Thank you for your purchase. Your payment was successful.
                </p>

                <!-- 📦 Order Details -->
                <div class="order-box text-start mb-4">

                    <div class="d-flex justify-content-between">
                        <span class="text-muted">Order ID</span>
                        <strong>#{{ order.id }}</strong>
                    </div>

                    <div class="d-flex justify-content-between mt-2">
                        <span class="text-muted">Payment Status</span>
                        <span class="text-success fw-semibold">
                            {{ order.payment_status }}
                        </span>
                    </div>

                    <div class="d-flex justify-content-between mt-2">
                        <span class="text-muted">Total Paid</span>
                        <strong>₹{{ order.total }}</strong>
                    </div>

                    <div class="d-flex justify-content-between mt-2">
                        <span class="text-muted">Order Status</span>
                        <span class="badge bg-success">
                            {{ order.status }}
                        </span>
                    </div>

                </div>

                <!-- 🔘 Buttons -->
                <div class="d-flex gap-3 justify-content-center">

                    <a href="/" class="btn btn-dark px-4">
                        Continue Shopping
                    </a>

                    <a href="{% url 'order' %}" class="btn btn-outline-dark px-4">
                        View Orders
                    </a>

                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
