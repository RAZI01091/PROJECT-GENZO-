<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Category | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f3f4f6;
            font-family:'Segoe UI',sans-serif;
        }

        .page-title{
            font-weight:700;
            color:#3b2f1c;
            margin-bottom:25px;
        }

        .main-card{
            max-width:820px;
            margin:auto;
            border-radius:18px;
            box-shadow:0 20px 45px rgba(0,0,0,0.08);
            background:white;
        }

        .section-card{
            background:#fafafa;
            border-radius:14px;
            padding:22px;
            margin-top:25px;
        }

        .btn-brown{
            background:#8b6f47;
            color:white;
            border:none;
            border-radius:10px;
            padding:10px 22px;
            font-weight:500;
        }

        .btn-brown:hover{
            background:#735a39;
            color:white;
        }

        .btn-delete{
            background:#c0392b;
            color:white;
            border-radius:10px;
            padding:8px 18px;
            border:none;
        }

        .btn-delete:hover{
            background:#a93226;
            color:white;
        }

        .btn-cancel{
            background:#d1d5db;
            border-radius:10px;
            padding:10px 22px;
        }

        .cat-input{
            border-radius:10px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="page-title">Add Category</h2>

    <div class="main-card p-4">

        <!-- 🔹 ADD CATEGORY FORM -->
        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Category Name</label>
                <input type="text"
                       name="name"
                       class="form-control form-control-lg cat-input"
                       placeholder="New category"
                       required>
            </div>

            <div class="d-flex gap-3">
                <button type="submit" class="btn btn-brown">
                    Add Category
                </button>

                <a href="{% url 'admin_category' %}" class="btn btn-cancel">
                    Cancel
                </a>
            </div>
        </form>

        <!-- 🔹 EXISTING CATEGORIES -->
        <div class="section-card">
            <h5 class="fw-bold mb-4">Existing Categories</h5>

            {% for cat in categories %}
            <form method="POST" action="{% url 'update_category' cat.id %}" class="mb-3">
                {% csrf_token %}

                <div class="row g-2 align-items-center">

                    <div class="col-md-6">
                        <input type="text"
                               name="name"
                               value="{{ cat.name }}"
                               class="form-control cat-input">
                    </div>

                    <div class="col-md-3">
                        <button type="submit" class="btn btn-brown w-100">
                            Update
                        </button>
                    </div>

                    <div class="col-md-3">
                        <a href="{% url 'delete_category' cat.id %}"
                           class="btn btn-delete w-100"
                           onclick="return confirm('Delete this category?')">
                            Delete
                        </a>
                    </div>

                </div>
            </form>
            {% empty %}
            <p class="text-muted">No categories yet</p>
            {% endfor %}
        </div>

    </div>
</div>

</body>
</html>
