<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SubCategory Management | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            font-family:'Segoe UI',sans-serif;
        }

        .page-title{
            font-weight:700;
            color:#2d2d2d;
            margin-bottom:25px;
        }

        .main-card{
            max-width:1000px;
            margin:auto;
            border-radius:18px;
            box-shadow:0 20px 45px rgba(0,0,0,0.08);
            background:white;
        }

        .section-card{
            background:#fafafa;
            border-radius:14px;
            padding:24px;
            margin-top:30px;
        }

        .btn-primary-custom{
            background:#8b6f47;
            color:white;
            border:none;
            border-radius:10px;
            padding:10px 22px;
            font-weight:500;
        }

        .btn-primary-custom:hover{
            background:#735a39;
            color:white;
        }

        .btn-delete{
            background:#dc3545;
            color:white;
            border:none;
            border-radius:10px;
            padding:8px 16px;
        }

        .btn-delete:hover{
            background:#bb2d3b;
            color:white;
        }

        .input-rounded{
            border-radius:10px;
        }

        .table thead{
            background:#f1f3f5;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h2 class="page-title">SubCategory Management</h2>

    <div class="main-card p-4">

        <!-- ================= ADD SUBCATEGORY ================= -->
        <form method="POST" class="mb-4">
            {% csrf_token %}

            <div class="row g-3">

                <div class="col-md-5">
                    <label class="form-label fw-semibold">SubCategory Name</label>
                    <input type="text"
                           name="name"
                           class="form-control form-control-lg input-rounded"
                           placeholder="New SubCategory"
                           required>
                </div>

                <div class="col-md-5">
                    <label class="form-label fw-semibold">Select Category</label>
                    <select name="category"
                            class="form-select form-select-lg input-rounded"
                            required>
                        <option value="">Choose category</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary-custom w-100">
                        Add
                    </button>
                </div>

            </div>
        </form>

        <!-- ================= FILTER ================= -->
        <div class="section-card">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold mb-0">Existing SubCategories</h5>
            </div>

            <form method="GET" class="row g-2 mb-4">

                <div class="col-md-4">
                    <select name="filter_category"
                            class="form-select"
                            onchange="this.form.submit()">

                        <option value="">All Categories</option>

                        {% for cat in categories %}
                            <option value="{{ cat.id }}"
                                {% if selected_category == cat.id|stringformat:"s" %}
                                    selected
                                {% endif %}>
                                {{ cat.name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-2">
                    <a href="{% url 'add_subcategory' %}"
                       class="btn btn-secondary w-100">
                        Reset
                    </a>
                </div>

            </form>

            <!-- ================= TABLE ================= -->
            <div class="table-responsive">
                <table class="table align-middle text-center">

                    <thead>
                        <tr>
                            <th>SubCategory</th>
                            <th>Category</th>
                            <th width="220">Action</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for sub in subcategories %}
                        <tr>
                            <td class="fw-semibold">{{ sub.name }}</td>
                            <td>{{ sub.category.name }}</td>

                            <td>
                                <form method="POST"
                                      action="{% url 'update_subcategory' sub.id %}"
                                      class="d-flex gap-2">
                                    {% csrf_token %}

                                    <input type="hidden" name="name" value="{{ sub.name }}">
                                    <input type="hidden" name="category" value="{{ sub.category.id }}">

                                    <button class="btn btn-primary-custom btn-sm">
                                        Update
                                    </button>

                                    <a href="{% url 'delete_subcategory' sub.id %}"
                                       class="btn btn-delete btn-sm"
                                       onclick="return confirm('Delete this subcategory?')">
                                       Delete
                                    </a>
                                </form>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="text-muted">
                                No subcategories found
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>

                </table>
            </div>

        </div>

    </div>
</div>

</body>
</html>
