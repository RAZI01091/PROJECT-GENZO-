<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Delivery Address</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f6f7f9;
    font-family:'Poppins',sans-serif;
}

/* ===== CARD ===== */
.address-card{
    background:#fff;
    border-radius:18px;
    padding:32px;
    border:1px solid #e9ecef;
    box-shadow:0 12px 32px rgba(0,0,0,0.05);
}

/* ===== TITLE ===== */
.page-title{
    font-weight:700;
}

/* ===== INPUT ===== */
.form-control,
.form-select{
    border-radius:10px;
    padding:12px;
}

.form-control:focus,
.form-select:focus{
    box-shadow:none;
    border-color:#000;
}

/* ===== BUTTON ===== */
.save-btn{
    padding:14px;
    font-weight:600;
    border-radius:12px;
}

/* ===== BACK LINK ===== */
.back-link{
    text-decoration:none;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container py-5" style="max-width:800px;">

    <!-- 🔙 Back to checkout -->
    <a href="{% url 'checkout' %}" class="back-link text-muted">
        ← Back to checkout
    </a>

    <div class="address-card mt-3">

        <h4 class="page-title mb-4">Add Delivery Address</h4>

        <form method="post">
            {% csrf_token %}

            <div class="row g-3">

                <!-- NAME -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <!-- PHONE -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Mobile Number</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>

                <!-- PINCODE -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Pincode</label>
                    <input type="text" name="pincode" class="form-control" required>
                </div>

                <!-- LOCALITY -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Locality</label>
                    <input type="text" name="locality" class="form-control" required>
                </div>

                <!-- ADDRESS -->
                <div class="col-12">
                    <label class="form-label fw-semibold">Address (Area & Street)</label>
                    <textarea name="address" rows="3" class="form-control" required></textarea>
                </div>

                <!-- CITY -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">City / District</label>
                    <input type="text" name="city" class="form-control" required>
                </div>

                <!-- STATE -->
                <div class="col-md-6">
                    <label class="form-label fw-semibold">State</label>
                    <select name="state" class="form-select" required>
                        <option value="">-- Select State --</option>
                        <option>Kerala</option>
                        <option>Tamil Nadu</option>
                        <option>Karnataka</option>
                        <option>Maharashtra</option>
                    </select>
                </div>

                <!-- DEFAULT CHECKBOX -->
                <div class="col-12">
                    <div class="form-check mt-2">
                        <input class="form-check-input"
                               type="checkbox"
                               name="is_default"
                               id="defaultAddr">

                        <label class="form-check-label" for="defaultAddr">
                            Set as default address
                        </label>
                    </div>
                </div>

            </div>

            <!-- SAVE BUTTON -->
            <button type="submit"
                    class="btn btn-dark w-100 save-btn mt-4">
                Save Address
            </button>

        </form>

    </div>

</div>

</body>
</html>
