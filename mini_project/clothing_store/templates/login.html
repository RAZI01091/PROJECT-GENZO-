{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 1rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-control {
            border-radius: 0.6rem;
            padding: 0.7rem 1rem;
        }

        .btn-primary {
            border-radius: 0.6rem;
            padding: 0.7rem;
            font-weight: 500;
            background: #4e73df;
            border: none;
        }

        .btn-primary:hover {
            background: #2e59d9;
        }

        /* ---------- Google Button ---------- */
        .google-btn {
    height: 48px;
    border: 1px solid #dadce0;
    border-radius: 8px;
    background: #ffffff;
    font-weight: 500;
    font-size: 14px;
    color: #3c4043;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: all 0.2s ease;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}

.google-btn img {
    width: 18px;
}

.google-btn:hover {
    background: #f8f9fa;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transform: translateY(-1px);
}

.google-btn:active {
    transform: scale(0.98);
}


        /* ---------- Divider ---------- */
        .divider {
            text-align: center;
            margin: 1.2rem 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            height: 1px;
            width: 40%;
            background: #ddd;
            position: absolute;
            top: 50%;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: #fff;
            padding: 0 0.6rem;
            color: #888;
            font-size: 0.9rem;
        }

        .forgot-link {
            font-size: 0.9rem;
        }

        .signup-link a {
            font-weight: 500;
            color: #4e73df;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2 class="text-center mb-4">Welcome Back</h2>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            {{ form.login }}
        </div>

        <div class="mb-2">
            {{ form.password }}
        </div>

        <div class="text-end mb-3">
            <a href="{% url 'forgot' %}" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">
            Login
        </button>
    </form>

    <!-- Divider -->
    <div class="divider">
        <span>OR</span>
    </div>
    <!-- Continue with Google -->
  <a href="{% provider_login_url 'google'%}" class="google-btn text-decoration-none w-100 mt-2">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
    Continue with Google
</a>


    <!-- Signup -->
    <p class="text-center mt-4 signup-link">
        Don’t have an account?
        <a href="{% url 'signup' %}">Sign Up</a>
    </p>
</div>

</body>
</html>
