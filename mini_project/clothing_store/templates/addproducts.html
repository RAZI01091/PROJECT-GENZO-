<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        }

        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            animation: slideFade 0.45s ease;
        }

        @keyframes slideFade {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
        }

        .form-control {
            border-radius: 6px;
        }

        .upload-box {
            border: 1px dashed #ced4da;
            border-radius: 6px;
            padding: 14px;
            background: #fafafa;
        }

        .btn-primary {
            padding: 10px 38px;
            font-weight: 500;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #495057;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card p-4">
                <h4 class="page-title text-center mb-4">Add New Product</h4>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Basic Info -->
                    <div class="section-title">Basic Information</div>

                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <!-- Category -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-control" required>
                            <option value="">Select Category</option>
                            <option value="men">Men</option>
                            <option value="women">Women</option>
                            <option value="kids">Kids</option>
                            <option value="electronics">Electronics</option>
                            <option value="accessories">Accessories</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Price (₹)</label>
                            <input type="number" name="price" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" name="stock" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" rows="3" class="form-control" required></textarea>
                    </div>

                    <!-- Discount Section -->
                    <div class="section-title mt-3">Discount Details</div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Discount Price (₹)</label>
                            <input type="number" name="discount_price" class="form-control" placeholder="Optional">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Discount Percentage (%)</label>
                            <input type="number" name="discount_percentage" class="form-control" placeholder="Optional">
                        </div>
                    </div>

                    <!-- Images -->
                    <div class="section-title mt-3">Product Images</div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <div class="upload-box">
                                <input type="file" name="image1" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="upload-box">
                                <input type="file" name="image2" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="upload-box">
                                <input type="file" name="image3" class="form-control">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="upload-box">
                                <input type="file" name="image4" class="form-control">
                            </div>
                        </div>
                    </div>

                    <!-- Submit -->
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">
                            Save Product
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
