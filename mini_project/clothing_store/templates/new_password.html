<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-card {
            background: #fff;
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-card h3 {
            font-weight: 600;
            color: #333;
        }

        .reset-card p {
            font-size: 0.9rem;
            color: #666;
        }

        .form-control {
            border-radius: 0.6rem;
            padding: 0.7rem 1rem;
        }

        .btn-reset {
            background: #4e73df;
            border: none;
            border-radius: 0.6rem;
            padding: 0.7rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-reset:hover {
            background: #2e59d9;
        }

        .message-box {
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>

<div class="reset-card">

    <h3 class="text-center mb-2">Reset Password</h3>
    <p class="text-center mb-4">
        Create a strong new password for your account.
    </p>

    <!-- Django Messages -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} message-box">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="New Password"
                   required>
        </div>

        <div class="mb-4">
            <input type="password"
                   name="confirm_password"
                   class="form-control"
                   placeholder="Confirm Password"
                   required>
        </div>

        <button type="submit" class="btn btn-reset w-100">
            Update Password
        </button>
    </form>

</div>

</body>
</html>
