<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f8f9fa;
        }

        .wishlist-card {
            border-radius: 12px;
            border: 1px solid #e5e5e5;
            overflow: hidden;
            transition: 0.3s ease;
        }

        .wishlist-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        .wishlist-img {
            width: 100%;
            height: 230px;
            background: #eaeaea;
            border-bottom: 1px solid #ddd;
        }

        .product-title {
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .product-price {
            font-weight: 700;
            font-size: 17px;
            margin-bottom: 10px;
        }

        .btn-remove {
            border-radius: 8px;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <h2 class="mb-4 fw-bold text-center">My Wishlist</h2>

        <div class="row g-4">

            <!-- Wishlist Item 1 -->
            <div class="col-md-4">
                <div class="wishlist-card bg-white">
                    <div class="wishlist-img"></div>

                    <div class="p-3">
                        <h5 class="product-title">Classic Casual Shirt</h5>
                        <p class="product-price">₹1,499</p>

                        <button class="btn btn-outline-danger btn-remove w-100">
                            Remove from Wishlist
                        </button>
                    </div>
                </div>
            </div>

            <!-- Wishlist Item 2 -->
            <div class="col-md-4">
                <div class="wishlist-card bg-white">
                    <div class="wishlist-img"></div>

                    <div class="p-3">
                        <h5 class="product-title">Slim Fit Denim Jeans</h5>
                        <p class="product-price">₹2,199</p>

                        <button class="btn btn-outline-danger btn-remove w-100">
                            Remove from Wishlist
                        </button>
                    </div>
                </div>
            </div>

            <!-- Wishlist Item 3 -->
            <div class="col-md-4">
                <div class="wishlist-card bg-white">
                    <div class="wishlist-img"></div>

                    <div class="p-3">
                        <h5 class="product-title">Premium Hoodie</h5>
                        <p class="product-price">₹1,999</p>

                        <button class="btn btn-outline-danger btn-remove w-100">
                            Remove from Wishlist
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
