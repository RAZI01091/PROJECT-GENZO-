<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f8f9fa;
        }

        .setup-card {
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            border: 1px solid #e5e5e5;
            max-width: 600px;
            margin: auto;
        }

        .profile-pic {
            width: 130px;
            height: 130px;
            background: #e2e2e2;
            border-radius: 50%;
            margin: auto;
        }

        .form-label {
            font-weight: 600;
        }

        .btn-save {
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <h2 class="text-center fw-bold mb-4">Profile Setup</h2>

        <div class="setup-card">

            <!-- User Image -->
            <div class="text-center mb-3">
                <div class="profile-pic"></div>
            </div>

            <form>

                <!-- NAME -->
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name">
                </div>

                <!-- PHONE -->
                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input type="text" class="form-control" placeholder="Mobile number">
                </div>

                <!-- EMAIL -->
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="Email">
                </div>

                <!-- ADDRESS -->
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" rows="3" placeholder="Your full address"></textarea>
                </div>

                <!-- SAVE BUTTON -->
                <button type="submit" class="btn btn-dark w-100 btn-save">Save Profile</button>

            </form>

        </div>

    </div>

</body>

</html>
