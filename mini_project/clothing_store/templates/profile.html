<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background: #f8f9fa;
        }

        .profile-card {
            background: #fff;
            border-radius: 15px;
            padding: 30px;
            border: 1px solid #e5e5e5;
        }

        .profile-pic {
            width: 140px;
            height: 140px;
            background: #e2e2e2;
            border-radius: 50%;
            margin: auto;
        }

        .edit-btn {
            border-radius: 8px;
            font-weight: 600;
        }

        .info-title {
            font-weight: 600;
            color: #555;
        }

        .info-box {
            padding: 18px;
            border-radius: 10px;
            border: 1px solid #e5e5e5;
            background: #fff;
        }

        .section-title {
            font-size: 22px;
            font-weight: 700;
        }

        .order-card {
            border: 1px solid #e5e5e5;
            border-radius: 12px;
            padding: 20px;
            background: white;
        }

        .order-img {
            height: 75px;
            background: #e2e2e2;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <h2 class="text-center fw-bold mb-4">My Profile</h2>

        <div class="row g-4">

            <!-- LEFT: Profile Details -->
            <div class="col-lg-4">
                <div class="profile-card text-center">

                    <div class="profile-pic mb-3"></div>

                    <h4 class="fw-bold">Razi User</h4>
                    <p class="text-muted">raziuser@example.com</p>

                    <button class="btn btn-dark w-100 edit-btn mt-3">Edit Profile</button>

                </div>
            </div>

            <!-- RIGHT: Info + Orders -->
            <div class="col-lg-8">

                <!-- Personal Info -->
                <div class="info-box mb-4">
                    <h5 class="section-title mb-3">Personal Information</h5>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <p class="info-title mb-1">Full Name</p>
                            <p class="fw-semibold">Razi User</p>
                        </div>
                        <div class="col-md-6">
                            <p class="info-title mb-1">Email</p>
                            <p class="fw-semibold">raziuser@example.com</p>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <p class="info-title mb-1">Phone Number</p>
                            <p class="fw-semibold">+91 99999 88888</p>
                        </div>
                        <div class="col-md-6">
                            <p class="info-title mb-1">Address</p>
                            <p class="fw-semibold">Kochi, Kerala</p>
                        </div>
                    </div>
                </div>

                <!-- Recent Orders -->
                <div class="info-box">
                    <h5 class="section-title mb-3">Recent Orders</h5>

                    <!-- Order 1 -->
                    <div class="order-card mb-3">
                        <div class="row align-items-center">

                            <div class="col-md-2">
                                <div class="order-img"></div>
                            </div>

                            <div class="col-md-7">
                                <p class="fw-bold mb-1">Classic Casual Shirt</p>
                                <p class="text-muted mb-1">Order ID: #12345</p>
                                <span class="badge bg-success">Delivered</span>
                            </div>

                            <div class="col-md-3 text-end">
                                <p class="fw-bold mb-1">₹1,499</p>
                                <button class="btn btn-outline-dark btn-sm">View</button>
                            </div>

                        </div>
                    </div>

                    <!-- Order 2 -->
                    <div class="order-card mb-3">
                        <div class="row align-items-center">

                            <div class="col-md-2">
                                <div class="order-img"></div>
                            </div>

                            <div class="col-md-7">
                                <p class="fw-bold mb-1">Premium Hoodie</p>
                                <p class="text-muted mb-1">Order ID: #12346</p>
                                <span class="badge bg-warning text-dark">In Transit</span>
                            </div>

                            <div class="col-md-3 text-end">
                                <p class="fw-bold mb-1">₹1,999</p>
                                <button class="btn btn-outline-dark btn-sm">View</button>
                            </div>

                        </div>
                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
