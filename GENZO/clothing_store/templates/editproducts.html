<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,.08);
        }
        .section-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #495057;
        }
        .img-preview {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card p-4">
                <h4 class="text-center mb-4">Edit Product</h4>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- CATEGORY (READ ONLY) -->
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text"
                               class="form-control"
                               value="{{ product.category.name }}"
                               disabled>
                        <input type="hidden" name="category" value="{{ product.category.id }}">
                    </div>

                    <div class="section-title">Basic Info</div>

                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text"
                               name="name"
                               class="form-control"
                               value="{{ product.name }}"
                               required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Sub Category</label>
                        <select name="subcategory" class="form-control" required>
                            {% for sub in subcategories %}
                                <option value="{{ sub.id }}"
                                    {% if sub.id == product.subcategory.id %}selected{% endif %}>
                                    {{ sub.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Price</label>
                            <input type="number"
                                   name="price"
                                   class="form-control"
                                   value="{{ product.price }}"
                                   required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number"
                                   name="stock"
                                   class="form-control"
                                   value="{{ product.stock }}"
                                   required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description"
                                  rows="3"
                                  class="form-control">{{ product.description }}</textarea>
                    </div>

                    <div class="section-title">Discount</div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <input type="number"
                                   name="discount_price"
                                   class="form-control"
                                   placeholder="Discount Price"
                                   value="{{ product.discount_price }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <input type="number"
                                   name="discount_percentage"
                                   class="form-control"
                                   placeholder="Discount %"
                                   value="{{ product.discount_percentage }}">
                        </div>
                    </div>

                    <div class="section-title">Current Images</div>

                    <div class="row g-3 mb-3">
                        {% for img in product.images.all %}
                            <div class="col-md-3">
                                <img src="{{ img.image.url }}" class="img-preview">
                            </div>
                        {% endfor %}
                    </div>

                    <div class="section-title">Update Images (Optional)</div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><input type="file" name="image0" class="form-control"></div>
                        <div class="col-md-3"><input type="file" name="image1" class="form-control"></div>
                        <div class="col-md-3"><input type="file" name="image2" class="form-control"></div>
                        <div class="col-md-3"><input type="file" name="image3" class="form-control"></div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-success px-5">
                            Update Product
                        </button>
                        <a href="{% url 'adminproducts' %}" class="btn btn-secondary ms-2">
                            Cancel
                        </a>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
