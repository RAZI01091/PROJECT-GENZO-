<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,.08);
        }
        .section-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #495057;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card p-4">
                <h4 class="text-center mb-4">Add New Product</h4>

                <!-- CATEGORY SELECT (GET) -->
                <form method="GET">
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select name="category"
                                class="form-control"
                                onchange="this.form.submit()">
                            {% for category in categories %}
                                <option value="{{ category.id }}"
                                    {% if category.id == selected_category %}selected{% endif %}>
                                    {{ category.name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </form>

                <!-- PRODUCT FORM (POST) -->
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <input type="hidden" name="category" value="{{ selected_category }}">

                    <div class="section-title">Basic Info</div>

                    <div class="mb-3">
                        <label class="form-label">Product Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Sub Category</label>
                        <select name="subcategory" class="form-control" required>
                            {% for sub in subcategories %}
                                <option value="{{ sub.id }}">{{ sub.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Price</label>
                            <input type="number" name="price" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Stock</label>
                            <input type="number" name="stock" class="form-control" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea name="description" rows="3" class="form-control"></textarea>
                    </div>

                    <div class="section-title">Discount</div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <input type="number" name="discount_price" class="form-control" placeholder="Discount Price">
                        </div>
                        <div class="col-md-6 mb-3">
                            <input type="number" name="discount_percentage" class="form-control" placeholder="Discount %">
                        </div>
                    </div>

                    <div class="section-title">Images</div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-3"><input type="file" name="image0" class="form-control"></div>
                        <div class="col-md-3"><input type="file" name="image1" class="form-control"></div>
                        <div class="col-md-3"><input type="file" name="image2" class="form-control"></div>
                        <div class="col-md-3"><input type="file" name="image3" class="form-control"></div>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary px-5">
                            Save Product
                        </button>
                    </div>
                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
