<!DOCTYPE html>
<html>
<head>
<title>Notifications</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:700px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.clear-btn{
background:#8B6F47;
color:white;
padding:8px 14px;
border-radius:5px;
text-decoration:none;
font-size:14px;
}

.notification{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.time{
font-size:12px;
color:gray;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h2>Notifications</h2>

{% comment %} <a href="{% url 'clear_notifications' %}" class="clear-btn">
Clear All
</a> {% endcomment %}

</div>

{% for n in notifications %}

<div class="notification">

<p>{{ n.message }}</p>

<div class="time">
{{ n.created_at|date:"d M Y H:i" }}
</div>

</div>

{% empty %}

<p>No notifications</p>

{% endfor %}

</div>

</body>
</html>
