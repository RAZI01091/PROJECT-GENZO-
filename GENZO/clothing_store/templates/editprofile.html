<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Profile | Men's Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
    background:#f6f7fb;
    font-family:'Poppins',sans-serif;
}

/* ===== CARD ===== */
.edit-card{
    background:#ffffff;
    border-radius:18px;
    padding:32px;
    border:1px solid #e9ecef;
    box-shadow:0 15px 40px rgba(0,0,0,0.05);
}

/* ===== PROFILE PREVIEW ===== */
.profile-preview{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #f1f1f1;
}

/* ===== LABEL ===== */
.form-label{
    font-weight:600;
    color:#495057;
}

/* ===== BUTTON ===== */
.save-btn{
    border-radius:10px;
    font-weight:600;
    padding:10px;
}

/* ===== HEADER ===== */
.page-title{
    font-weight:700;
}
</style>

</head>

<body>

<div class="container py-5" style="max-width:720px;">

```
<h2 class="text-center mb-4 page-title">Edit Profile</h2>

<div class="edit-card">

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- ===== IMAGE PREVIEW ===== -->
        <div class="text-center mb-4">

            {% if profile.image %}
                <img src="{{ profile.image.url }}" class="profile-preview mb-3">
            {% else %}
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png"
                     class="profile-preview mb-3">
            {% endif %}

            <div>
                <input type="file" name="image" class="form-control">
            </div>

        </div>

        <!-- ===== PHONE ===== -->
        <div class="mb-3">
            <label class="form-label">Phone Number</label>
            <input type="text"
                   name="phone"
                   value="{{ profile.phone }}"
                   class="form-control"
                   placeholder="Enter phone number">
        </div>

        <!-- ===== ADDRESS ===== -->
        <div class="mb-4">
            <label class="form-label">Address</label>
            <textarea name="address"
                      class="form-control"
                      rows="3"
                      placeholder="Enter your address">{{ profile.address }}</textarea>
        </div>

        <!-- ===== ACTIONS ===== -->
        <div class="d-grid">
            <button type="submit" class="btn btn-dark save-btn">
                Save Changes
            </button>
        </div>

    </form>

</div>
```

</div>

</body>
</html>
