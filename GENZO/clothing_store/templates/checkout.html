<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Clothing Store</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .checkout-container {
      margin-top: 50px;
      margin-bottom: 50px;
    }

    .checkout-title {
      text-align: center;
      margin-bottom: 30px;
    }

    .form-control:focus {
      box-shadow: none;
      border-color: #ff6b6b;
    }

    .order-summary {
      background-color: #fff;
      padding: 20px;
      border-radius: 10px;
    }

    .order-summary h5 {
      border-bottom: 1px solid #dee2e6;
      padding-bottom: 10px;
      margin-bottom: 20px;
    }

    .btn-checkout {
      background-color: #ff6b6b;
      color: #fff;
      border: none;
    }

    .btn-checkout:hover {
      background-color: #ff4757;
      color: #fff;
    }

    .form-check-input:checked {
      background-color: #ff6b6b;
      border-color: #ff6b6b;
    }

    /* CSS-only show/hide new address form */
    #addNewAddressForm {
      display: none;
    }

    #addNew:checked~#addNewAddressForm {
      display: block;
    }

    /* optional smooth display */
    #addNewAddressForm {
      transition: all 0.3s ease;
    }
  </style>
</head>

<body>
  <div class="container checkout-container">
    <h2 class="checkout-title">Checkout</h2>
    <div class="row">
      <!-- Shipping Address -->
      <div class="col-lg-7 mb-4">
        <div class="card p-4">
          <h4>Shipping Address</h4>

          <div class="form-check mb-2">
            <input class="form-check-input" type="radio" name="addressOption" id="useProfile" checked>
            <label class="form-check-label" for="useProfile">
              Use Profile Address
            </label>
          </div>

          <div class="p-3 border rounded mt-2 mb-3 bg-light">
            <strong>John Doe</strong><br>
            123 Main Street, Apartment 4B<br>
            City, ZIP 12345<br>
            India<br>
            Phone: +91 9876543210
          </div>

          <div class="form-check mb-2">
            <input class="form-check-input" type="radio" name="addressOption" id="addNew">
            <label class="form-check-label" for="addNew">
              Add New Address
            </label>
          </div>

          <!-- New Address Form (CSS-only display) -->
          <div id="addNewAddressForm" class="mt-3">
            <form>
              <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" placeholder="Enter your name">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number">
              </div>
              <div class="mb-3">
                <label for="address" class="form-label">Address</label>
                <textarea class="form-control" id="address" rows="2" placeholder="Enter your address"></textarea>
              </div>
              <div class="mb-3">
                <label for="city" class="form-label">City</label>
                <input type="text" class="form-control" id="city" placeholder="City">
              </div>
              <div class="mb-3">
                <label for="zip" class="form-label">ZIP / Postal Code</label>
                <input type="text" class="form-control" id="zip" placeholder="ZIP Code">
              </div>
              <div class="mb-3">
                <label for="country" class="form-label">Country</label>
                <select class="form-select" id="country">
                  <option selected>Choose your country</option>
                  <option>India</option>
                  <option>USA</option>
                  <option>UK</option>
                  <option>Other</option>
                </select>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="col-lg-5">
        <div class="order-summary">
          <h5>Order Summary</h5>
          <ul class="list-group mb-3">
            <li class="list-group-item d-flex justify-content-between">
              <span>Men's Shirt x1</span>
              <strong>$25.00</strong>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span>Women's Jacket x2</span>
              <strong>$80.00</strong>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span>Shipping</span>
              <strong>$10.00</strong>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              <span>Total</span>
              <strong>$115.00</strong>
            </li>
          </ul>




<a href="{% url 'ordersummary'%}" class="btn btn-checkout w-100 mt-3">Place Order</a>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
