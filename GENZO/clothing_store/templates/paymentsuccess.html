{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Successful – GENZO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --mocha: #8B5A2B;
    --mocha-dark: #6f4722;
    --charcoal: #1a1a2e;
    --platinum: #f8f6f2;
    --silver: #e8e4dd;
    --green: #2d9e5f;
    --shadow: 0 12px 40px rgba(0,0,0,0.09);
    --radius: 20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Poppins', sans-serif;
    background: var(--platinum);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ===== TOPBAR ===== */
.topbar {
    background: #fff;
    border-bottom: 1px solid var(--silver);
    padding: 14px 0;
}

.topbar-brand {
    font-size: 1.5rem;
    font-weight: 800;
    color: #000;
    text-decoration: none;
    letter-spacing: -0.5px;
    display: block;
    text-align: center;
}

/* ===== PAGE ===== */
.success-page {
    flex: 1;
    display: flex;
    align-items: center;
    padding: 48px 16px 80px;
}

/* ===== CARD ===== */
.success-card {
    background: #fff;
    border-radius: var(--radius);
    padding: 48px 40px;
    border: 1px solid var(--silver);
    box-shadow: var(--shadow);
    text-align: center;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
}

/* ===== CHECKMARK ANIMATION (CSS only) ===== */
.success-circle {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #d1fae5, #a7f3d0);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}

.success-circle i {
    font-size: 2.8rem;
    color: var(--green);
}

@keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
}

/* ===== HEADING ===== */
.success-title {
    font-family: Georgia, serif;
    font-size: clamp(1.4rem, 4vw, 1.8rem);
    font-weight: 700;
    color: var(--charcoal);
    margin-bottom: 8px;
}

.success-subtitle {
    font-size: 0.88rem;
    color: #aaa;
    margin-bottom: 28px;
    line-height: 1.6;
}

/* ===== ORDER BOX ===== */
.order-box {
    background: #faf9f7;
    border: 1px solid var(--silver);
    border-radius: 14px;
    padding: 20px 22px;
    margin-bottom: 28px;
    text-align: left;
}

.order-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f0ece5;
    font-size: 0.88rem;
}

.order-row:first-child { padding-top: 0; }
.order-row:last-child  { border-bottom: none; padding-bottom: 0; }

.order-row .label { color: #aaa; font-weight: 500; }
.order-row .value { font-weight: 700; color: var(--charcoal); }
.order-row .value.green { color: var(--green); }

.status-pill {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: #d1fae5;
    color: #065f46;
}

/* ===== BUTTONS ===== */
.btn-group-success {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.btn-primary-dark {
    display: block;
    padding: 12px 20px;
    background: linear-gradient(135deg, var(--mocha), var(--mocha-dark));
    color: #fff;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.88rem;
    text-decoration: none;
    text-align: center;
    transition: opacity 0.2s, transform 0.15s;
}

.btn-primary-dark:hover {
    opacity: 0.9;
    color: #fff;
    transform: translateY(-2px);
}

.btn-outline-dark-custom {
    display: block;
    padding: 12px 20px;
    background: transparent;
    border: 2px solid var(--charcoal);
    color: var(--charcoal);
    border-radius: 12px;
    font-weight: 700;
    font-size: 0.88rem;
    text-decoration: none;
    text-align: center;
    transition: all 0.2s;
}

.btn-outline-dark-custom:hover {
    background: var(--charcoal);
    color: #fff;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */

@media (max-width: 479px) {
    .success-card { padding: 36px 20px; }
    .success-circle { width: 76px; height: 76px; }
    .success-circle i { font-size: 2.2rem; }
    .btn-group-success { grid-template-columns: 1fr; gap: 10px; }
    .order-box { padding: 16px; }
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="container">
        <a href="{% url 'home' %}" class="topbar-brand">GENZO</a>
    </div>
</div>

<!-- PAGE -->
<div class="success-page">
    <div class="container">

        <div class="success-card">

            <!-- ICON -->
            <div class="success-circle">
                <i class="bi bi-check-lg"></i>
            </div>

            <!-- HEADING -->
            <h3 class="success-title">Order Placed Successfully!</h3>
            <p class="success-subtitle">
                Thank you for your purchase.<br>Your payment was successful.
            </p>

            <!-- ORDER DETAILS -->
            <div class="order-box">
                <div class="order-row">
                    <span class="label">Order ID</span>
                    <span class="value">#{{ order.id }}</span>
                </div>
                <div class="order-row">
                    <span class="label">Payment Status</span>
                    <span class="value green">{{ order.payment_status }}</span>
                </div>
                <div class="order-row">
                    <span class="label">Total Paid</span>
                    <span class="value">₹{{ order.total }}</span>
                </div>
                <div class="order-row">
                    <span class="label">Order Status</span>
                    <span class="status-pill">{{ order.status }}</span>
                </div>
            </div>

            <!-- BUTTONS -->
            <div class="btn-group-success">
                <a href="{% url 'home' %}" class="btn-primary-dark">
                    Continue Shopping
                </a>
                <a href="{% url 'order' %}" class="btn-outline-dark-custom">
                    View Orders
                </a>
            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
