<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | Users</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .admin-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .table thead {
            background: linear-gradient(135deg, #0d6efd, #084298);
            color: #fff;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            background-color: #f1f5ff;
            transform: scale(1.01);
        }

        .badge-active {
            background-color: #198754;
        }

        .badge-blocked {
            background-color: #dc3545;
        }

        .action-btn {
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="admin-card p-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">
                <i class="bi bi-people-fill me-2"></i>
                User Management
            </h3>
            <a href="{% url 'adminpanel' %}" class="badge bg-primary p-2 text-decoration-none">
    Admin Panel
</a>

        </div>

        <!-- Table -->
        <div class="table-responsive">
            <table class="table table-bordered align-middle text-center">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                {% for user in user %}
                    <tr>
                        <td>{{ user.id }}</td>
                        <td>{{ user.username }}</td>
                        <td>{{ user.email }}</td>

                        <!-- STATUS -->
                        <td>
                            {% if user.is_active %}
                                <span class="badge badge-active px-3 py-2">
                                    <i class="bi bi-check-circle me-1"></i> Active
                                </span>
                            {% else %}
                                <span class="badge badge-blocked px-3 py-2">
                                    <i class="bi bi-x-circle me-1"></i> Blocked
                                </span>
                            {% endif %}
                        </td>

                        <!-- ACTION -->
                        <td>
                            {% if user.is_active %}
                                <a href="{% url 'block_unblock' user.id %}"
                                   class="btn btn-outline-danger btn-sm action-btn">
                                   <i class="bi bi-lock-fill"></i> Block
                                </a>
                            {% else %}
                                <a href="{% url 'block_unblock' user.id %}"
                                   class="btn btn-outline-success btn-sm action-btn">
                                   <i class="bi bi-unlock-fill"></i> Unblock
                                </a>
                            {% endif %}
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>
        </div>

    </div>
</div>

</body>
</html>
