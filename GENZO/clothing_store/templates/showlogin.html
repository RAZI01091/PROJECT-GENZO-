<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Required</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f4f6f9, #e9ecf1);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-wrapper {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 45px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
            animation: fadeSlide 0.9s ease;
        }

        .auth-icon {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            box-shadow: 0 15px 35px rgba(13, 110, 253, 0.45);
            animation: float 3s ease-in-out infinite;
        }

        .auth-icon i {
            font-size: 40px;
            color: #ffffff;
        }

        .auth-wrapper h2 {
            font-weight: 600;
            margin-bottom: 10px;
        }

        .auth-wrapper p {
            color: #6c757d;
            font-size: 15px;
            margin-bottom: 35px;
        }

        /* PROFESSIONAL LOGIN BUTTON */
        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border: none;
            padding: 14px 38px;
            font-size: 16px;
            font-weight: 500;
            color: #ffffff;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 12px 30px rgba(13, 110, 253, 0.45);
            transition: all 0.35s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 40px rgba(102, 16, 242, 0.55);
            background: linear-gradient(135deg, #6610f2, #0d6efd);
            color: #ffffff;
        }

        .btn-login i {
            font-size: 18px;
        }

        .back-link {
            display: inline-block;
            margin-top: 25px;
            color: #6c757d;
            font-size: 14px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #0d6efd;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(35px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
            100% {
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-icon">
            <i class="bi bi-lock-fill"></i>
        </div>

        <h2>Login Required</h2>
        <p>You need to sign in to access  and continue shopping securely.</p>

        <a href="{% url 'loggin' %}" class="btn btn-login">
            <i class="bi bi-box-arrow-in-right"></i>
            Login to Continue
        </a>

        <br>

        <a href="{% url 'home' %}" class="back-link">
            ← Continue browsing
        </a>
    </div>

</body>
</html>
